name = "workshop-game"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Secrets and environment-specific values belong in:
#   Local:  server/.dev.vars  (copy from .dev.vars.example; gitignored)
#   Prod:   wrangler secret put ADMIN_EMAIL
#           wrangler secret put JWT_SECRET
#           wrangler secret put ALLOWED_EMAIL_DOMAINS
#           wrangler secret put REPO_URL
#           wrangler secret put ROOM_DOMAINS   # optional: "domain1.com:room-a,domain2.com:room-b"

[assets]
directory = "../frontend/dist"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "76a9afa3c3db437495bf9041078637a8"
preview_id = "8b35467cdcfd434cacd62dde5fdfbf99"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "PRESENTATION_ROOM"
class_name = "PresentationRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["PresentationRoom"]
