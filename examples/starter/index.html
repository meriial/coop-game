<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop Pixel Art</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; }
    p  { color: #94a3b8; margin-bottom: 1.5rem; }

    input {
      background: #1e293b;
      border: 1px solid #334155;
      color: #f8fafc;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      width: 260px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }

    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { background: #475569; cursor: not-allowed; }

    /* ── Game screen ── */
    #game-screen { width: 100%; max-width: 860px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    header h1 { font-size: 1.25rem; }

    #progress-track {
      background: #1e293b;
      border-radius: 9999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 0.25rem;
    }
    #progress-bar {
      background: linear-gradient(90deg, #6366f1, #ec4899);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }
    #progress-text { color: #94a3b8; font-size: 0.8rem; margin-bottom: 1.5rem; }

    #grids {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .grid-label {
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 1px;
      background: #1e293b;
      border: 1px solid #1e293b;
      border-radius: 0.25rem;
      aspect-ratio: 1;
    }

    .cell { background: #0f172a; }
    .cell.target-empty { background: #0f172a; }
    .cell.target-filled { background: #1e293b; }
    .cell.paintable { cursor: pointer; }
    .cell.paintable:hover { filter: brightness(1.25); }

    #player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: #1e293b;
      padding: 0.2rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
    }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    #victory {
      display: none;
      text-align: center;
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      background: #1e293b;
      border: 1px solid #84cc16;
      border-radius: 0.5rem;
      color: #a3e635;
      font-size: 1.25rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="name-screen">
    <h1>Workshop Pixel Art</h1>
    <p>Work together to paint the heart!</p>
    <div style="display:flex;align-items:center">
      <input id="name-input" type="text" placeholder="Your name" maxlength="20" autofocus />
      <button id="join-btn">Join</button>
    </div>
  </div>

  <div id="game-screen" style="display:none">
    <header>
      <h1>Workshop Pixel Art</h1>
      <span id="player-count" style="color:#94a3b8;font-size:0.85rem">0 players</span>
    </header>

    <div id="progress-track"><div id="progress-bar"></div></div>
    <p id="progress-text">0% — click cells on the canvas to paint</p>

    <div id="grids">
      <div>
        <div class="grid-label">Target</div>
        <div id="target-grid" class="grid"></div>
      </div>
      <div>
        <div class="grid-label">Canvas</div>
        <div id="canvas-grid" class="grid"></div>
      </div>
    </div>

    <div id="player-list"></div>
    <div id="victory">The pixel art is complete!</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
